<!DOCTYPE html>
<html>

<head>
  <title>Direct Backend Test</title>
</head>

<body>

<button onclick="testChat()">
  Test Chat
</button>

<script>

async function testChat() {

  const response =
    await fetch(
      "http://localhost:3000/chat",
      {
        method: "POST",

        headers: {
          "Content-Type":
            "application/json"
        },

        body: JSON.stringify({
          message: "test@gmail.com"
        })
      }
    );

  const data =
    await response.json();

  console.log(data);

}

</script>

</body>

</html>
