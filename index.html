<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>777 AI Assistant</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {

      font-family: Arial, sans-serif;

      background: linear-gradient(135deg, #0f172a, #1e293b);

      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      color: white;
    }

    .chat-container {

      width: 420px;
      height: 700px;

      background: #111827;

      border-radius: 20px;

      overflow: hidden;

      box-shadow: 0 0 40px rgba(0,0,0,0.4);

      display: flex;
      flex-direction: column;
    }

    .chat-header {

      background: #dc2626;

      padding: 20px;

      font-size: 22px;
      font-weight: bold;

      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-header span {

      width: 12px;
      height: 12px;

      background: #4ade80;

      border-radius: 50%;
    }

    .chat-box {

      flex: 1;

      padding: 20px;

      overflow-y: auto;

      display: flex;
      flex-direction: column;

      gap: 15px;
    }

    .message {

      max-width: 80%;

      padding: 14px;

      border-radius: 15px;

      line-height: 1.4;

      animation: fadeIn 0.3s ease;
    }

    .user {

      background: #2563eb;

      align-self: flex-end;

      border-bottom-right-radius: 5px;
    }

    .ai {

      background: #374151;

      align-self: flex-start;

      border-bottom-left-radius: 5px;
    }

    .chat-input {

      display: flex;

      padding: 15px;

      background: #1f2937;

      gap: 10px;
    }

    .chat-input input {

      flex: 1;

      padding: 14px;

      border: none;

      border-radius: 12px;

      background: #374151;

      color: white;

      font-size: 15px;

      outline: none;
    }

    .chat-input button {

      background: #dc2626;

      border: none;

      padding: 14px 20px;

      border-radius: 12px;

      color: white;

      font-weight: bold;

      cursor: pointer;

      transition: 0.2s;
    }

    .chat-input button:hover {

      background: #ef4444;
    }

    .typing {

      font-size: 14px;
      opacity: 0.7;

      margin-left: 5px;
    }

    @keyframes fadeIn {

      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }

    }

  </style>

</head>

<body>

  <div class="chat-container">

    <div class="chat-header">

      <span></span>

      777 AI Assistant

    </div>

    <div class="chat-box" id="chat-box">

      <div class="message ai">
        Hello 👋 How can I help you today?
      </div>

    </div>

    <div class="chat-input">

      <input
        type="text"
        id="message-input"
        placeholder="Type your message..."
        onkeydown="handleKey(event)"
      />

      <button onclick="sendMessage()">
        Send
      </button>

    </div>

  </div>

  <script>

    function handleKey(event) {

      if (event.key === "Enter") {
        sendMessage();
      }

    }

    async function sendMessage() {

      const input = document.getElementById("message-input");

      const message = input.value.trim();

      if (!message) return;

      const chatBox = document.getElementById("chat-box");

      chatBox.innerHTML += `
        <div class="message user">
          ${message}
        </div>
      `;

      input.value = "";

      chatBox.innerHTML += `
        <div class="message ai typing" id="typing">
          AI is typing...
        </div>
      `;

      chatBox.scrollTop = chatBox.scrollHeight;

      try {

        const response = await fetch("http://localhost:3000/chat", {

          method: "POST",

          headers: {
            "Content-Type": "application/json"
          },

          body: JSON.stringify({
            message: message
          })

        });

        const data = await response.json();

        document.getElementById("typing").remove();

        chatBox.innerHTML += `
          <div class="message ai">
            ${data.reply}
          </div>
        `;

        chatBox.scrollTop = chatBox.scrollHeight;

      } catch (error) {

        console.log(error);

        document.getElementById("typing").remove();

        chatBox.innerHTML += `
          <div class="message ai">
            Error connecting to AI server.
          </div>
        `;
      }

    }

  </script>

</body>

</html>
